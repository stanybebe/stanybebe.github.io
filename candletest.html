<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hidden {
          display: none;
        }
      </style>
</head>
<body>
    <form id="timerForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br>
    
        <label for="type">Type:</label>
        <select id="type" name="type" onchange="toggleFields()">
          <option value="alarm">Alarm</option>
          <option value="candle">Candle</option>
          <option value="note">Note</option>
        </select><br>
    
        <div id="alarmFields" class="hidden">
          <label for="alarmTime">Alarm Set Time:</label>
          <input type="time" id="alarmTime" name="alarmTime"><br>
        </div>
    
        <div id="candleFields" class="hidden">
          <label for="interval">Interval:</label>
          <input type="number" id="interval" name="interval"><br>
    
          <label for="delay">Delay:</label>
          <input type="number" id="delay" name="delay"><br>
        </div>
    
        <div id="noteFields" class="hidden">
          <label for="note">Note:</label>
          <textarea id="note" name="note"></textarea><br>
        </div>
    
        <button type="submit">Submit</button>
      </form>
    
      <script>
        function toggleFields() {
          const type = document.getElementById("type").value;
          const alarmFields = document.getElementById("alarmFields");
          const candleFields = document.getElementById("candleFields");
          const noteFields = document.getElementById("noteFields");
    
          // Hide all fields first
          alarmFields.classList.add("hidden");
          candleFields.classList.add("hidden");
          noteFields.classList.add("hidden");
    
          // Show fields based on selected type
          if (type === "alarm") {
            alarmFields.classList.remove("hidden");
          } else if (type === "candle") {
            candleFields.classList.remove("hidden");
          } else if (type === "note") {
            noteFields.classList.remove("hidden");
          }
        }
    
        document.getElementById("timerForm").addEventListener("submit", function(event) {
          event.preventDefault();
    
          // Gather form data
          const formData = new FormData(event.target);
          const data = {};
          for (const [key, value] of formData.entries()) {
            data[key] = value;
          }
    
          // Set null values for non-displayed fields based on type
          const type = data.type;
          if (type === "alarm") {
            data.interval = null;
            data.delay = null;
            data.note = null;
          } else if (type === "candle") {
            data.alarmTime = null;
            data.note = null;
          } else if (type === "note") {
            data.alarmTime = null;
            data.interval = null;
            data.delay = null;
          }
    
          // Submit data (for demonstration, logging to console)
          console.log("Submitted data:", data);
    
          // Reset the form
          event.target.reset();
        });

        document.addEventListener("DOMContentLoaded", function() {
    // Set the default type to "alarm"
    alarmFields.classList.remove("hidden");
});
      </script>

</body>
